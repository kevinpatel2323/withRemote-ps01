services:
  postgres:
    image: postgres:16-alpine
    container_name: sync_postgres
    environment:
      POSTGRES_USER: sync
      POSTGRES_PASSWORD: sync
      POSTGRES_DB: syncdb
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sync -d syncdb']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
