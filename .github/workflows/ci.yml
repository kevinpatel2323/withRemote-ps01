name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sync
          POSTGRES_PASSWORD: sync
          POSTGRES_DB: syncdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sync -d syncdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://sync:sync@localhost:5432/syncdb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint:check
      - run: npm run build
      - run: npm run db:migrate
      - run: npm test
